; vertical-lift-bridge :: PlatformIO project configuration
; v2.0 — adds LVGL 9.2.2, drops IR sensor library, adds vision UART link.
;
; OWNER: M1 (George). Other members request edits in the group chat.

[platformio]
default_envs = vlb_main
src_dir      = src
include_dir  = src

[env:vlb_main]
platform        = espressif32 @ 6.7.0      ; pinned for build reproducibility
board           = esp32dev                  ; ESP32-WROOM-32 generic dev board
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600
upload_protocol = esptool
monitor_filters = esp32_exception_decoder, time
board_build.f_cpu        = 240000000L
board_build.partitions   = huge_app.csv      ; 3 MB app partition (fits LVGL + fonts + icons)
board_build.flash_mode   = dio
board_build.f_flash      = 80000000L

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=27
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=40000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DDISABLE_ALL_LIBRARY_WARNINGS=1
    -std=gnu++17

build_unflags = -std=gnu++11

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43            ; low-level driver bound to LVGL flush
    lvgl/lvgl @ ^9.2.2                    ; UI framework
    bblanchon/ArduinoJson @ ^7.2.1        ; vision-link JSON parser
    me-no-dev/AsyncTCP @ ^1.1.1           ; (optional) MQTT/Wi-Fi
    knolleary/PubSubClient @ ^2.8         ; (optional) MQTT
