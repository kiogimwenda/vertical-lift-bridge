[platformio]
default_envs = native

[env:native]
platform = native
lib_deps =
    lvgl/lvgl@8.3.11
build_flags =
    -D LV_CONF_SKIP
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_DRV_NO_CONF
    -D LV_USE_LOG=1
    -D LV_LOG_PRINTF=1
    -D LV_COLOR_DEPTH=16
    -D LV_COLOR_16_SWAP=0
    -D LV_MEM_CUSTOM=1
    -D LV_TICK_CUSTOM=1
    -D LV_USE_CANVAS=1
    -D LV_USE_ARC=1
    -D LV_USE_BAR=1
    -D LV_USE_BTN=1
    -D LV_USE_BTNMATRIX=1
    -D LV_USE_CHECKBOX=1
    -D LV_USE_DROPDOWN=1
    -D LV_USE_IMG=1
    -D LV_USE_LABEL=1
    -D LV_USE_LINE=1
    -D LV_USE_ROLLER=1
    -D LV_USE_SLIDER=1
    -D LV_USE_SWITCH=1
    -D LV_USE_TEXTAREA=1
    -D LV_USE_TABLE=1
    -D LV_USE_LIST=1
    -D LV_USE_CHART=1
    -D LV_USE_METER=1
    -D LV_USE_TABVIEW=1
    -D LV_USE_TILEVIEW=1
    -D LV_USE_WIN=1
    -D LV_USE_MSGBOX=1
    -D LV_USE_ANIMIMG=1
    -D LV_USE_CALENDAR=1
    -D LV_USE_SPINBOX=1
    -D LV_USE_SPINNER=1
    -D LV_FONT_MONTSERRAT_12=1
    -D LV_FONT_MONTSERRAT_14=1
    -D LV_FONT_MONTSERRAT_16=1
    -D LV_FONT_MONTSERRAT_18=1
    -D LV_FONT_MONTSERRAT_24=1
    -D LV_USE_THEME_DEFAULT=1
    -D LV_THEME_DEFAULT_DARK=1
    -D LV_LVGL_H_INCLUDE_SIMPLE
    ; Windows SDL2 paths - we will assume standard MinGW/MSYS2 paths or local project paths
    -lSDL2
    -D LV_USE_SDL=1
    -D SDL_HOR_RES=320
    -D SDL_VER_RES=240
    -D SDL_ZOOM=1
