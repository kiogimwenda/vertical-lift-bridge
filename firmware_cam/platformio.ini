; firmware_cam/platformio.ini
; ESP32-CAM (AI-Thinker) companion module
[env:esp32cam]
platform        = espressif32@6.7.0
board           = esp32cam
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600
build_flags     =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
lib_deps        =
    espressif/esp32-camera
